<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Agent Dashboard</title>
  <link rel="stylesheet" href="sdpi.css" />
</head>
<body>
  <div class="sdpi-wrapper">
    <div class="sdpi-heading">Agent Dashboard</div>

    <div class="sdpi-info">
      Displays a summary of all Deckhand agents on a single button.
      The title shows agent counts by status.
    </div>

    <div class="sdpi-info">
      <strong>Legend:</strong> > running &bull; ? awaiting input &bull; ! error &bull; - idle
    </div>

    <div class="sdpi-info">
      Press the button to refresh the view.
    </div>
  </div>
</body>
</html>
