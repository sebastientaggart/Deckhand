# Deckhand Configuration File Example
#
# Copy this file to config.toml and customize as needed.
# Or set DECKHAND_CONFIG_FILE environment variable to point to your config file.

[service]
name = "deckhand"
host = "127.0.0.1"
port = 8000

[plugins]
# List of plugin module paths to load
modules = [
  "deckhand.plugins.builtin",
  # "my_custom_plugin",
]

[paths]
# Path to JSON file for persisting state across restarts (optional)
# state_file = "state.json"

[auth]
# API keys with scopes. Each key must have a "key" and a "scope" ("read" or "write").
# Write scope implies read access. If no keys are configured, a temporary
# write key is auto-generated on startup and logged to the console.
#
# api_keys = [
#   { key = "your-write-key-here", scope = "write" },
#   { key = "your-read-key-here", scope = "read" },
# ]
#
# Legacy single-key format (treated as write scope):
# api_key = "your-secret-key"

[rate_limit]
# Maximum requests per minute per client IP (default: 60)
# rpm = 60
